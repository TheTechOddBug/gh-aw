name: Refresh Models JSON

on:
  workflow_dispatch:

permissions: {}

jobs:
  refresh-models-json:
    name: Refresh models.json from models.dev
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate actor permissions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const role = data.role_name;
            core.info(`Actor ${context.actor} has role: ${role}`);
            if (role !== 'admin' && role !== 'maintain') {
              core.setFailed(
                `❌ ${context.actor} must be a repository admin or maintainer to refresh models.json ` +
                `(current role: ${role})`
              );
            } else {
              core.info(`✅ ${context.actor} is authorized (role: ${role})`);
            }

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run models refresh
        run: make refresh-models-json

      - name: Check for changes
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain pkg/cli/data/models.json actions/setup/js/models.json)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Detected model catalog changes."
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No model catalog changes detected."
          fi

      - name: Configure Git
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create pull request with refreshed models
        if: steps.check-changes.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="ci/refresh-models-json-${{ github.run_id }}"

          git checkout -b "$BRANCH_NAME"
          git add pkg/cli/data/models.json actions/setup/js/models.json
          git commit -m "chore: refresh models.json from models.dev catalog"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "chore: refresh models.json from models.dev catalog" \
            --body "This pull request refreshes model pricing data from \`https://models.dev/catalog.json\` by running \`make refresh-models-json\`.

          It was created automatically by the [refresh-models-json workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --head "$BRANCH_NAME" \
            --base main
